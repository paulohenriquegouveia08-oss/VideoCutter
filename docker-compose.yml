version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: vc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: videocutter
      POSTGRES_USER: videocutter
      POSTGRES_PASSWORD: vc_secret_2024
    ports:
      - "5436:5432"
    volumes:
      - vc_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: vc-redis
    restart: unless-stopped
    ports:
      - "6381:6379"
    volumes:
      - vc_redis_data:/data

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: vc-api
    restart: unless-stopped
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgresql://videocutter:vc_secret_2024@postgres:5432/videocutter
      REDIS_URL: redis://redis:6379
      JWT_SECRET: vc_jwt_secret_2024
      STORAGE_PATH: /app/storage
      PORT: 3100
    depends_on:
      - postgres
      - redis
    volumes:
      - vc_storage:/app/storage

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: vc-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://videocutter:vc_secret_2024@postgres:5432/videocutter
      REDIS_URL: redis://redis:6379
      STORAGE_PATH: /app/storage
    depends_on:
      - postgres
      - redis
    volumes:
      - vc_storage:/app/storage

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: vc-web
    restart: unless-stopped
    ports:
      - "3110:80"

volumes:
  vc_postgres_data:
  vc_redis_data:
  vc_storage:
